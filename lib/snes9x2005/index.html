<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280,initial-scale=1.0">
  <title>Retro TV - SNES</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #output, #fs_output {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #e94560;
      font-family: Arial, sans-serif;
      font-size: 24px;
    }
    /* Hide all snes9x2005 UI elements */
    #menu, #menuOpen3ParentParent, #root > div:not(#fullScreenRoot),
    .squareButton, #gamepadSettings, #aboutArea,
    #menuHeader, .buttonRemapSelectParent { display: none !important; }
    #fullScreenRoot { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    #fs_output {
      position: static;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
      will-change: transform;
      /* CSS scales 256x224 canvas to fill screen — GPU does the upscale, not CPU */
      width: 100vw;
      height: calc(100vw * 0.875);
      max-height: 100vh;
      max-width: calc(100vh / 0.875);
    }
  </style>
</head>
<body>
  <!-- Required by snes9x2005 script.js -->
  <template id="buttonRemapSelectParentTemplate">
    <div class="buttonRemapSelectParent"><select class="buttonRemapSelect"></select></div>
  </template>
  <div id="root">
    <div id="fullScreenRoot">
      <canvas id="fs_output" width="256" height="224"></canvas>
    </div>
    <div id="menu" style="display:none">
      <div id="menuHeader"><div id="menuHeaderLeftMessage"></div><div id="menuHeaderRightMessage"><a id="menuHeaderLeftMessageChild"></a></div></div>
      <div id="squareButtonParentParent"><div id="squareButtonParent">
        <div class="squareButton" id="muteButton"><div class="squareButtonMsg" id="muteButtonMsg"></div></div>
        <div class="squareButton" id="fullScreenButton"><div class="squareButtonMsg" id="fullScreenButtonMsg"></div></div>
        <div class="squareButton" id="loadRomButton"><div class="squareButtonMsg"></div></div>
        <div class="squareButton" id="loadSramButton"><div class="squareButtonMsg"></div></div>
        <div class="squareButton" id="saveSramButton"><div class="squareButtonMsg"></div></div>
        <div class="squareButton" id="loadStateButton"><div class="squareButtonMsg"></div></div>
        <div class="squareButton" id="saveStateButton"><div class="squareButtonMsg"></div></div>
        <div class="squareButton" id="gamepadSettingsButton"><div class="squareButtonMsg"></div></div>
        <div class="squareButton" id="aboutButton"><div class="squareButtonMsg"></div></div>
      </div></div>
      <div id="gamepadSettings"><div id="gamepadNameShowParent"><div id="gamepadNameShow"></div></div><div id="gamepadButtonSettings"></div></div>
      <div id="aboutArea"></div>
    </div>
  </div>
  <canvas id="output" width="256" height="224" style="display:none"></canvas>
  <div id="loading">Loading SNES...</div>

  <script>
    // Scale canvas to fill screen maintaining aspect ratio
    function resizeCanvas() {
      var c = document.getElementById('fs_output');
      var w = window.innerWidth, h = window.innerHeight;
      var ratio = 256 / 224;
      var cw, ch;
      if (w / h > ratio) { ch = h; cw = ch * ratio; }
      else { cw = w; ch = cw / ratio; }
      c.style.width = Math.floor(cw) + 'px';
      c.style.height = Math.floor(ch) + 'px';
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
  </script>

  <script src="gamepad.js"></script>
  <script src="snes9x_2005.js"></script>
  <script src="script.js"></script>

  <script>
    // Hide loading text when game starts
    var origRun1fr = window.run1fr;
    if (typeof run1fr === 'function') {
      var loadingEl = document.getElementById('loading');
      var firstFrame = true;
      var _origRequestFrame = window.requestFrame;
      // Will be hidden on first frame render
    }
    // Simple check: hide loading after 5 seconds regardless
    setTimeout(function() {
      var el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    }, 5000);
  </script>
</body>
</html>
